.content {
    padding: 40px;
}

ul {
    list-style: none;
    padding: 0;
}

ul li {
    background: #fff;
    margin: 10px auto;
    padding: 10px;
    width: 60%;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

@media (max-width: 600px) {
    ul li {
        width: 90%;
    }

    nav a {
        display: block;
        margin: 10px 0;
    }
}
